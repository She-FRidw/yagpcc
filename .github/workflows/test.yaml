# --------------------------------------------------------------------
# GitHub Actions Workflow: Yagpcc Test Pipeline
# --------------------------------------------------------------------
# Description:
#
#   Builds yagpcc, runs golangci-lint, then runs `make unittest` (Ginkgo CLI,
#   ./..., race). Ginkgo --github-output integrates with Actions logs.

name: Go unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

jobs:
  tests:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25' ]

    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Download modules
        run: go mod download
      - name: Check if builds successfully
        run: go build ./...
      - name: Linter checks
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6
      - name: Unit tests (all packages)
        run: make unittest
